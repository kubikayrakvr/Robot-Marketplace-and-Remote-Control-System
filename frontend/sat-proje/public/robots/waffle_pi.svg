<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Base platform -->
  <rect x="40" y="80" width="120" height="20" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
  
  <!-- Left wheel -->
  <circle cx="60" cy="110" r="18" fill="none" stroke="#666" stroke-width="3"/>
  <circle cx="60" cy="110" r="12" fill="#333" stroke="#444" stroke-width="2"/>
  
  <!-- Right wheel -->
  <circle cx="140" cy="110" r="18" fill="none" stroke="#666" stroke-width="3"/>
  <circle cx="140" cy="110" r="12" fill="#333" stroke="#444" stroke-width="2"/>
  
  <!-- Main body -->
  <rect x="50" y="40" width="100" height="45" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" rx="4"/>
  
  <!-- Camera on top -->
  <rect x="85" y="25" width="30" height="18" fill="#1a1a1a" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
  <circle cx="100" cy="34" r="8" fill="#333" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="100" cy="34" r="5" fill="#111"/>
  
  <!-- LIDAR on top -->
  <circle cx="100" cy="15" r="8" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
  <path d="M 100 7 L 106 13 L 100 19 L 94 13 Z" fill="#00d4ff" opacity="0.5"/>
  
  <!-- Status lights -->
  <circle cx="70" cy="50" r="3" fill="#00d4ff"/>
  <circle cx="85" cy="50" r="3" fill="#00d4ff"/>
  <circle cx="100" cy="50" r="3" fill="#00d4ff"/>
  <circle cx="115" cy="50" r="3" fill="#00d4ff"/>
  <circle cx="130" cy="50" r="3" fill="#00d4ff"/>
</svg>