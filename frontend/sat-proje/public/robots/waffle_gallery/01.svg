<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background environment -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Floor grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ddd" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Waffle robot - side view -->
  <g transform="translate(100, 80)">
    <!-- Base -->
    <rect x="0" y="60" width="120" height="20" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
    <!-- Wheel left -->
    <circle cx="20" cy="90" r="18" fill="none" stroke="#666" stroke-width="3"/>
    <circle cx="20" cy="90" r="12" fill="#333"/>
    <!-- Wheel right -->
    <circle cx="100" cy="90" r="18" fill="none" stroke="#666" stroke-width="3"/>
    <circle cx="100" cy="90" r="12" fill="#333"/>
    <!-- Body -->
    <rect x="10" y="20" width="100" height="45" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" rx="4"/>
    <!-- Camera -->
    <rect x="40" y="5" width="30" height="18" fill="#1a1a1a" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
    <circle cx="55" cy="14" r="8" fill="#333" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="55" cy="14" r="5" fill="#111"/>
    <!-- LIDAR -->
    <circle cx="55" cy="-5" r="8" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
    <path d="M 55 -13 L 61 -7 L 55 -1 L 49 -7 Z" fill="#00d4ff" opacity="0.5"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" font-size="16" text-anchor="middle" fill="#333" font-family="Arial">Waffle Pi - Side View</text>
</svg>