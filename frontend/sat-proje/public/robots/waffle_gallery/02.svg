<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Floor grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ddd" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Waffle robot - top view (3D perspective) -->
  <g transform="translate(150, 80)">
    <!-- Top view perspective -->
    <ellipse cx="50" cy="30" rx="50" ry="60" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
    
    <!-- Camera -->
    <rect x="35" y="10" width="30" height="20" fill="#1a1a1a" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
    <circle cx="50" cy="20" r="8" fill="#333" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="50" cy="20" r="5" fill="#111"/>
    
    <!-- LIDAR top -->
    <circle cx="50" cy="8" r="6" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
    
    <!-- Wheels (top view) -->
    <ellipse cx="20" cy="25" rx="8" ry="12" fill="#333" stroke="#666" stroke-width="1"/>
    <ellipse cx="80" cy="25" rx="8" ry="12" fill="#333" stroke="#666" stroke-width="1"/>
    <ellipse cx="20" cy="55" rx="8" ry="12" fill="#333" stroke="#666" stroke-width="1"/>
    <ellipse cx="80" cy="55" rx="8" ry="12" fill="#333" stroke="#666" stroke-width="1"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" font-size="16" text-anchor="middle" fill="#333" font-family="Arial">Waffle Pi - Top View</text>
</svg>