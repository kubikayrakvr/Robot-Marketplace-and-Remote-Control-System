<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Waffle robot - front view with details -->
  <g transform="translate(100, 50)">
    <!-- Base -->
    <rect x="20" y="100" width="140" height="25" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
    
    <!-- Main body -->
    <rect x="30" y="30" width="120" height="75" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" rx="4"/>
    
    <!-- Camera module (prominent) -->
    <rect x="50" y="10" width="80" height="25" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
    <circle cx="90" cy="22" r="10" fill="#333" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="90" cy="22" r="6" fill="#111"/>
    
    <!-- LIDAR on top -->
    <circle cx="90" cy="0" r="8" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
    
    <!-- Side vents -->
    <rect x="20" y="45" width="5" height="50" fill="#333" stroke="#444" stroke-width="1"/>
    <rect x="155" y="45" width="5" height="50" fill="#333" stroke="#444" stroke-width="1"/>
    
    <!-- Wheels (front view) -->
    <circle cx="40" cy="130" r="18" fill="none" stroke="#666" stroke-width="3"/>
    <circle cx="40" cy="130" r="12" fill="#333"/>
    
    <circle cx="140" cy="130" r="18" fill="none" stroke="#666" stroke-width="3"/>
    <circle cx="140" cy="130" r="12" fill="#333"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" font-size="16" text-anchor="middle" fill="#333" font-family="Arial">Waffle Pi - Front View</text>
</svg>