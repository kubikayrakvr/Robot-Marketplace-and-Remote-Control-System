<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Floor grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ddd" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Burger robot - top view (3D perspective) -->
  <g transform="translate(150, 80)">
    <!-- Top view perspective -->
    <ellipse cx="50" cy="35" rx="45" ry="55" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" opacity="0.9"/>
    
    <!-- Camera -->
    <rect x="30" y="12" width="40" height="18" fill="#1a1a1a" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
    <circle cx="50" cy="21" r="7" fill="#333" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="50" cy="21" r="4" fill="#111"/>
    
    <!-- LIDAR top -->
    <circle cx="50" cy="0" r="5" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
    
    <!-- Wheels (top view) - compact -->
    <ellipse cx="18" cy="25" rx="6" ry="10" fill="#333" stroke="#666" stroke-width="1"/>
    <ellipse cx="82" cy="25" rx="6" ry="10" fill="#333" stroke="#666" stroke-width="1"/>
    <ellipse cx="18" cy="50" rx="6" ry="10" fill="#333" stroke="#666" stroke-width="1"/>
    <ellipse cx="82" cy="50" rx="6" ry="10" fill="#333" stroke="#666" stroke-width="1"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" font-size="16" text-anchor="middle" fill="#333" font-family="Arial">Burger - Top View</text>
</svg>