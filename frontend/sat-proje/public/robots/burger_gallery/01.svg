<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background environment -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Floor grid -->
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ddd" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#grid)"/>
  
  <!-- Burger robot - side view -->
  <g transform="translate(120, 90)">
    <!-- Base -->
    <rect x="0" y="50" width="100" height="18" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
    <!-- Wheel left -->
    <circle cx="20" cy="76" r="15" fill="none" stroke="#666" stroke-width="2.5"/>
    <circle cx="20" cy="76" r="9" fill="#333"/>
    <!-- Wheel right -->
    <circle cx="80" cy="76" r="15" fill="none" stroke="#666" stroke-width="2.5"/>
    <circle cx="80" cy="76" r="9" fill="#333"/>
    <!-- Body -->
    <rect x="5" y="10" width="90" height="40" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" rx="4"/>
    <!-- Camera -->
    <rect x="25" y="-2" width="40" height="15" fill="#1a1a1a" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
    <circle cx="45" cy="5" r="7" fill="#333" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="45" cy="5" r="4" fill="#111"/>
    <!-- LIDAR -->
    <circle cx="45" cy="-12" r="6" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" font-size="16" text-anchor="middle" fill="#333" font-family="Arial">Burger - Side View</text>
</svg>