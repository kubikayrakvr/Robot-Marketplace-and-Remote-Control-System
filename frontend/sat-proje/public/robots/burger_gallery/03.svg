<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Burger robot - front view with details -->
  <g transform="translate(110, 60)">
    <!-- Base -->
    <rect x="25" y="95" width="110" height="22" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
    
    <!-- Main body (compact) -->
    <rect x="35" y="35" width="100" height="65" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" rx="4"/>
    
    <!-- Camera module -->
    <rect x="55" y="15" width="60" height="22" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
    <circle cx="85" cy="26" r="9" fill="#333" stroke="#00d4ff" stroke-width="1.5"/>
    <circle cx="85" cy="26" r="5" fill="#111"/>
    
    <!-- LIDAR on top -->
    <circle cx="85" cy="2" r="7" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
    
    <!-- Wheels (front view) -->
    <circle cx="50" cy="120" r="15" fill="none" stroke="#666" stroke-width="2.5"/>
    <circle cx="50" cy="120" r="9" fill="#333"/>
    
    <circle cx="120" cy="120" r="15" fill="none" stroke="#666" stroke-width="2.5"/>
    <circle cx="120" cy="120" r="9" fill="#333"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="280" font-size="16" text-anchor="middle" fill="#333" font-family="Arial">Burger - Front View</text>
</svg>