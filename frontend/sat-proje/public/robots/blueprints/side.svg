<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint background -->
  <defs>
    <pattern id="blueprint_grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a4d7a" stroke-width="0.3"/>
      <path d="M 0 0 L 20 20" fill="none" stroke="#1a4d7a" stroke-width="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#0a2d4a"/>
  <rect width="400" height="400" fill="url(#blueprint_grid)"/>
  
  <!-- Blueprint side view technical drawing -->
  <g transform="translate(50, 50)" stroke="#00d4ff" fill="none" stroke-width="2">
    <!-- Main body outline -->
    <rect x="20" y="30" width="140" height="60" stroke-width="2.5"/>
    
    <!-- Camera outline -->
    <rect x="50" y="10" width="50" height="22" stroke-width="1.5"/>
    <circle cx="75" cy="21" r="8" stroke-width="1"/>
    
    <!-- LIDAR -->
    <circle cx="75" cy="0" r="8" stroke-width="1.5"/>
    
    <!-- Wheel left -->
    <circle cx="30" cy="110" r="18" stroke-width="2"/>
    <circle cx="30" cy="110" r="10" stroke-width="1"/>
    
    <!-- Wheel right -->
    <circle cx="140" cy="110" r="18" stroke-width="2"/>
    <circle cx="140" cy="110" r="10" stroke-width="1"/>
    
    <!-- Height dimension -->
    <line x1="170" y1="30" x2="170" y2="128" stroke-dasharray="5,5" stroke-width="1"/>
    <text x="185" y="80" fill="#00d4ff" font-size="12">150mm</text>
    
    <!-- Length dimension -->
    <line x1="20" y1="145" x2="160" y2="145" stroke-dasharray="5,5" stroke-width="1"/>
    <text x="85" y="165" fill="#00d4ff" font-size="12" text-anchor="middle">385mm</text>
    
    <!-- Ground line -->
    <line x1="0" y1="128" x2="180" y2="128" stroke-dasharray="2,2" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="380" font-size="16" text-anchor="middle" fill="#00d4ff" font-family="Arial">Side View - Blueprint</text>
</svg>