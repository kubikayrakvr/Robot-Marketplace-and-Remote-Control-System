<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint background -->
  <defs>
    <pattern id="blueprint_grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a4d7a" stroke-width="0.3"/>
      <path d="M 0 0 L 20 20" fill="none" stroke="#1a4d7a" stroke-width="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#0a2d4a"/>
  <rect width="400" height="400" fill="url(#blueprint_grid)"/>
  
  <!-- Blueprint front view technical drawing -->
  <g transform="translate(40, 40)" stroke="#00d4ff" fill="none" stroke-width="2">
    <!-- Main body outline -->
    <rect x="30" y="40" width="120" height="70" stroke-width="2.5"/>
    
    <!-- Camera outline -->
    <rect x="50" y="15" width="80" height="28" stroke-width="1.5" rx="3"/>
    <circle cx="90" cy="29" r="12" stroke-width="1.2"/>
    <circle cx="90" cy="29" r="7" stroke-width="0.8"/>
    
    <!-- LIDAR on top -->
    <circle cx="90" cy="0" r="10" stroke-width="1.5"/>
    
    <!-- Wheel left -->
    <circle cx="30" cy="125" r="18" stroke-width="2"/>
    <circle cx="30" cy="125" r="11" stroke-width="1"/>
    
    <!-- Wheel right -->
    <circle cx="150" cy="125" r="18" stroke-width="2"/>
    <circle cx="150" cy="125" r="11" stroke-width="1"/>
    
    <!-- Side vents/details -->
    <line x1="20" y1="55" x2="20" y2="100" stroke-width="1.2" opacity="0.7"/>
    <line x1="160" y1="55" x2="160" y2="100" stroke-width="1.2" opacity="0.7"/>
    
    <!-- Width dimension -->
    <line x1="30" y1="155" x2="150" y2="155" stroke-dasharray="5,5" stroke-width="1"/>
    <text x="85" y="175" fill="#00d4ff" font-size="12" text-anchor="middle">450mm</text>
    
    <!-- Height dimension -->
    <line x1="170" y1="15" x2="170" y2="143" stroke-dasharray="5,5" stroke-width="1"/>
    <text x="195" y="80" fill="#00d4ff" font-size="12">150mm</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="380" font-size="16" text-anchor="middle" fill="#00d4ff" font-family="Arial">Front View - Blueprint</text>
</svg>