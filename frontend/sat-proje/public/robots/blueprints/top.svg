<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Blueprint background -->
  <defs>
    <pattern id="blueprint_grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1a4d7a" stroke-width="0.3"/>
      <path d="M 0 0 L 20 20" fill="none" stroke="#1a4d7a" stroke-width="0.2"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="#0a2d4a"/>
  <rect width="400" height="400" fill="url(#blueprint_grid)"/>
  
  <!-- Blueprint top view technical drawing -->
  <g transform="translate(50, 50)" stroke="#00d4ff" fill="none" stroke-width="2">
    <!-- Main body outline -->
    <rect x="50" y="0" width="100" height="130" stroke-width="2.5"/>
    
    <!-- Wheel positions (circles with dimensions) -->
    <circle cx="30" cy="20" r="16" stroke-width="2"/>
    <text x="30" y="45" fill="#00d4ff" font-size="10" text-anchor="middle">R1</text>
    
    <circle cx="190" cy="20" r="16" stroke-width="2"/>
    <text x="190" y="45" fill="#00d4ff" font-size="10" text-anchor="middle">R2</text>
    
    <circle cx="30" cy="130" r="16" stroke-width="2"/>
    <text x="30" y="155" fill="#00d4ff" font-size="10" text-anchor="middle">R3</text>
    
    <circle cx="190" cy="130" r="16" stroke-width="2"/>
    <text x="190" y="155" fill="#00d4ff" font-size="10" text-anchor="middle">R4</text>
    
    <!-- Camera position -->
    <rect x="80" y="-20" width="40" height="20" stroke-width="1.5"/>
    <text x="100" y="-5" fill="#00d4ff" font-size="10" text-anchor="middle">CAM</text>
    
    <!-- LIDAR position -->
    <circle cx="100" cy="-30" r="8" stroke-width="1.5"/>
    <text x="100" y="-55" fill="#00d4ff" font-size="10" text-anchor="middle">LIDAR</text>
    
    <!-- Dimension lines -->
    <line x1="10" y1="0" x2="10" y2="130" stroke-dasharray="5,5" stroke-width="1"/>
    <line x1="0" y1="135" x2="220" y2="135" stroke-dasharray="5,5" stroke-width="1"/>
    
    <!-- Dimensions -->
    <text x="5" y="70" fill="#00d4ff" font-size="12" text-anchor="end">450mm</text>
    <text x="110" y="155" fill="#00d4ff" font-size="12" text-anchor="middle">385mm</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="380" font-size="16" text-anchor="middle" fill="#00d4ff" font-family="Arial">Top View - Blueprint</text>
</svg>