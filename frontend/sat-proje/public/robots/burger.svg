<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Base platform -->
  <rect x="50" y="85" width="100" height="18" fill="#1a1a1a" stroke="#00d4ff" stroke-width="2" rx="2"/>
  
  <!-- Left wheel -->
  <circle cx="70" cy="113" r="15" fill="none" stroke="#666" stroke-width="2.5"/>
  <circle cx="70" cy="113" r="9" fill="#333" stroke="#444" stroke-width="2"/>
  
  <!-- Right wheel -->
  <circle cx="130" cy="113" r="15" fill="none" stroke="#666" stroke-width="2.5"/>
  <circle cx="130" cy="113" r="9" fill="#333" stroke="#444" stroke-width="2"/>
  
  <!-- Main body (compact) -->
  <rect x="55" y="45" width="90" height="40" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2" rx="4"/>
  
  <!-- Camera on top -->
  <rect x="80" y="32" width="40" height="15" fill="#1a1a1a" stroke="#00d4ff" stroke-width="1.5" rx="2"/>
  <circle cx="100" cy="39.5" r="7" fill="#333" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="100" cy="39.5" r="4" fill="#111"/>
  
  <!-- LIDAR (smaller, no camera) -->
  <circle cx="100" cy="18" r="6" fill="#2a2a2a" stroke="#00d4ff" stroke-width="2"/>
  <path d="M 100 12 L 105 17 L 100 22 L 95 17 Z" fill="#00d4ff" opacity="0.5"/>
  
  <!-- Status lights -->
  <circle cx="75" cy="55" r="2.5" fill="#00d4ff"/>
  <circle cx="90" cy="55" r="2.5" fill="#00d4ff"/>
  <circle cx="110" cy="55" r="2.5" fill="#00d4ff"/>
  <circle cx="125" cy="55" r="2.5" fill="#00d4ff"/>
</svg>