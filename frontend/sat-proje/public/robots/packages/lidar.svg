<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- LIDAR sensor diagram -->
  <g transform="translate(100, 50)">
    <!-- Central LIDAR unit -->
    <circle cx="100" cy="60" r="30" fill="none" stroke="#ff6b00" stroke-width="2.5"/>
    <circle cx="100" cy="60" r="24" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.5"/>
    
    <!-- Scanning rays (360 degree) -->
    <g stroke="#ff6b00" stroke-width="1" opacity="0.3">
      <line x1="100" y1="30" x2="100" y2="10"/>
      <line x1="121" y1="39" x2="133" y2="27"/>
      <line x1="130" y1="60" x2="150" y2="60"/>
      <line x1="121" y1="81" x2="133" y2="93"/>
      <line x1="100" y1="90" x2="100" y2="110"/>
      <line x1="79" y1="81" x2="67" y2="93"/>
      <line x1="70" y1="60" x2="50" y2="60"/>
      <line x1="79" y1="39" x2="67" y2="27"/>
    </g>
    
    <!-- Sensor elements on the LIDAR -->
    <circle cx="100" cy="60" r="8" fill="#ff6b00"/>
    <circle cx="100" cy="60" r="4" fill="#fff"/>
    
    <!-- Field of view indicators -->
    <path d="M 100 60 L 150 60 L 140 75 Z" fill="none" stroke="#ffb366" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    <path d="M 100 60 L 100 10 L 115 20 Z" fill="none" stroke="#ffb366" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>
    
    <!-- Specifications box -->
    <rect x="-40" y="125" width="280" height="85" fill="none" stroke="#333" stroke-width="1.5" rx="3"/>
    
    <text x="100" y="150" fill="#333" font-size="14" font-weight="bold" text-anchor="middle">LIDAR Specifications</text>
    
    <text x="-30" y="175" fill="#666" font-size="11">• 360° Scanning Range</text>
    <text x="-30" y="190" fill="#666" font-size="11">• 25m Detection Distance</text>
    <text x="-30" y="205" fill="#666" font-size="11">• 1800 samples/sec</text>
  </g>
</svg>