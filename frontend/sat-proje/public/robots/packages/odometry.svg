<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f5f5f5"/>
  
  <!-- Technical diagram for dimensions package -->
  <g transform="translate(50, 50)">
    <!-- Robot side view -->
    <g stroke="#1a1a1a" fill="none" stroke-width="2">
      <!-- Body -->
      <rect x="20" y="30" width="140" height="60" stroke-width="2.5"/>
      
      <!-- Wheel left -->
      <circle cx="30" cy="110" r="18" stroke-width="2"/>
      
      <!-- Wheel right -->
      <circle cx="140" cy="110" r="18" stroke-width="2"/>
      
      <!-- Dimension annotations -->
      <line x1="170" y1="30" x2="170" y2="108" stroke-dasharray="5,5" stroke-width="1" stroke="#0066cc"/>
      <line x1="20" y1="135" x2="160" y2="135" stroke-dasharray="5,5" stroke-width="1" stroke="#0066cc"/>
      
      <text x="185" y="70" fill="#0066cc" font-size="14" font-weight="bold">450mm</text>
      <text x="85" y="155" fill="#0066cc" font-size="14" font-weight="bold" text-anchor="middle">385mm</text>
      
      <!-- Wheel diameter -->
      <text x="30" y="155" fill="#0066cc" font-size="11" text-anchor="middle">36mm</text>
      
      <!-- Grid background for dimensions -->
      <g stroke="#ccc" stroke-width="0.5" opacity="0.3">
        <line x1="10" y1="0" x2="10" y2="140"/>
        <line x1="0" y1="140" x2="180" y2="140"/>
      </g>
    </g>
    
    <!-- Legend -->
    <text x="0" y="165" fill="#333" font-size="12" font-weight="bold">Odometry Package Specs:</text>
    <text x="0" y="185" fill="#666" font-size="11">• Wheel Encoder Support</text>
    <text x="0" y="200" fill="#666" font-size="11">• Accurate Distance Tracking</text>
  </g>
</svg>