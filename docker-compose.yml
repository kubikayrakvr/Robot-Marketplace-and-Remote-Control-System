services:
  # BACKEND: FastAPI & Siber Güvenlik Altyapısı
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: sat0_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy # Sadece başlamasını değil, sağlıklı olmasını bekliyoruz
    volumes:
      - .:/app
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # FRONTEND: Vite & User Interface
  frontend:
    build:
      context: ./frontend/sat-proje
      dockerfile: Dockerfile
    container_name: sat0_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/sat-proje/src:/app/src          # ← kaynak kod
      - ./frontend/sat-proje/public:/app/public    # ← public dosyalar
      - /app/node_modules                          # ← node_modules'ü override etme!
    depends_on:
      - app
    restart: always

  # DATABASE: PostgreSQL
  db:
    image: postgres:17
    container_name: sat0_postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Hardcoded değerler yerine ortam değişkenlerini kullanıyoruz
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # REDIS: Rate Limiting
  redis:
    image: redis:alpine
    container_name: sat0_redis
    ports:
      - "6379:6379"
    healthcheck:
      # Redis'in tam olarak ping-pong yanıtı verebildiğini doğruluyoruz
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  postgres_data:
